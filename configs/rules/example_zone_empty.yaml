# 区域清空检测（示例模板）
# 复制本文件并去掉 .example 后缀，修改参数后自动热加载生效

name: "example_zone_empty"

description: "当指定区域内没有任何目标时触发告警（如人员离岗检测）"

conditions:
  - type: zone_empty
    params:
      # 监控区域多边形顶点
      zone: [[200, 300], [400, 300], [400, 500], [200, 500]]
      # 目标类别
      target_classes: ["person"]

camera_ids: ["cam_02"]

severity: critical

cooldown: 60

time_windows:
  - start: "08:00"
    end: "18:00"
    days: [0, 1, 2, 3, 4]  # 仅工作日

actions:
  - type: record_clip
  - type: llm_analyze
  - type: notify

enabled: false
