rule_items:
- name: example_zone_intrusion
  conditions:
  - type: object_in_zone
    params:
      zone:
      - - 100.0
        - 200.0
      - - 300.0
        - 200.0
      - - 300.0
        - 400.0
      - - 100.0
        - 400.0
      target_classes:
      - no_helmet
  description: 当未佩戴安全帽的人员进入施工区域时触发告警
  camera_ids:
  - cam_01
  severity: warning
  cooldown: 300
  window_size: 5
  actions:
  - type: record_clip
  - type: llm_analyze
  - type: notify
  enabled: true
- name: example_count_line
  conditions:
  - type: count_line
    params:
      line_start:
      - 100.0
      - 300.0
      line_end:
      - 500.0
      - 300.0
      threshold: 10
      target_classes:
      - person
  description: 统计穿越指定线段的目标数量，达到阈值时触发告警
  camera_ids:
  - cam_01
  severity: info
  cooldown: 600
  actions:
  - type: notify
  enabled: false
- name: example_zone_empty
  conditions:
  - type: zone_empty
    params:
      zone:
      - - 200.0
        - 300.0
      - - 400.0
        - 300.0
      - - 400.0
        - 500.0
      - - 200.0
        - 500.0
      target_classes:
      - person
  description: 当指定区域内没有人员时触发告警（人员离岗检测）
  camera_ids:
  - cam_02
  severity: critical
  cooldown: 60
  actions:
  - type: record_clip
  - type: llm_analyze
  - type: notify
  enabled: false
